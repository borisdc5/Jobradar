name: Refresh CRM cache (weekly)

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday at 6:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Refresh CRM cache
        env:
          RECRUITCRM_API_KEY: ${{ secrets.RECRUITCRM_API_KEY }}
        run: python3 build_crm_cache.py

      - name: Commit & push cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crm_cache.json
          git diff --cached --quiet || git commit -m "Refresh CRM cache $(date +'%d/%m/%Y')"
          git pull --rebase --autostash origin main
          git push
