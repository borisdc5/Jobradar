name: Update jobs daily

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate site
        run: |
          python3 - << 'PYEOF'
          import urllib.request, ssl, json, re, os
          from datetime import datetime, timezone

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          def fetch(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              return urllib.request.urlopen(req, context=ctx, timeout=15).read().decode('utf-8')

          def extract_company(desc):
              m = re.match(r'^(.+?)\s+recrute', desc, re.IGNORECASE)
              return m.group(1).strip() if m else 'Studio'

          def extract_location(desc):
              m = re.search(r'bas[ee]\s+[aa]\s+([^(]+)\s*\((\d{2,3})\)', desc, re.IGNORECASE)
              if not m: return 'France'
              city = m.group(1).strip().lower()
              dept = m.group(2)
              if dept == '00' or 'remote' in city or 'travail' in city: return 'Remote'
              if dept in ['75','92','93','94','95','77','78','91']: return 'Paris'
              if dept == '69': return 'Lyon'
              if dept == '33': return 'Bordeaux'
              if dept == '35': return 'Rennes'
              if dept == '44': return 'Nantes'
              if dept == '34': return 'Montpellier'
              if dept == '31': return 'Toulouse'
              if dept == '59': return 'Lille'
              if dept == '13': return 'Marseille'
              return m.group(1).strip()

          def days_ago(pub):
              try:
                  from email.utils import parsedate_to_datetime
                  return max(0, (datetime.now(timezone.utc) - parsedate_to_datetime(pub)).days)
              except: return 99

          xml = fetch('https://emploi.afjv.com/rss.xml')
          items = re.findall(r'<item>(.*?)</item>', xml, re.DOTALL)
          jobs = []
          for i, item in enumerate(items):
              def g(tag):
                  m = re.search(r'<'+tag+r'[^>]*>(.*?)</'+tag+r'>', item, re.DOTALL)
                  return m.group(1).strip() if m else ''
              cats = re.findall(r'<category>(.*?)</category>', item)
              contrat = next((c for c in cats if c in ['CDI','CDD','Stage','Alternance','Freelance']), '')
              if contrat != 'CDI': continue
              category = next((c for c in cats if c not in ['CDI','CDD','Stage','Alternance','Freelance','France','International','Belgique']), '')
              desc = re.sub(r'<[^>]+>', ' ', g('description')).strip()
              jobs.append({'id':i,'title':g('title'),'company':extract_company(desc),'link':g('link'),'desc':desc[:200],'location':extract_location(desc),'category':category,'daysAgo':days_ago(g('pubDate')),'isESN':False})

          updated = datetime.now(timezone.utc).strftime('%d/%m/%Y')
          jobs_json = json.dumps(jobs, ensure_ascii=False)

          html = open('template.html').read().replace('__JOBS__', jobs_json).replace('__UPDATED__', updated)
          os.makedirs('docs', exist_ok=True)
          open('docs/index.html', 'w').write(html)
          print(f'OK - {len(jobs)} CDI generes')
          PYEOF

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "Update $(date +'%d/%m/%Y')" || echo "No changes"
          git push
